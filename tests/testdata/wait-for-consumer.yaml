---
apiVersion: v1
kind: Namespace
metadata:
  name: test-wait-for-consumer
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: p3-wait-for-consumer
provisioner: heathcliff.eu/predictable-path-provisioner
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-pvc
  namespace: test-wait-for-consumer
spec:
  storageClassName: p3-wait-for-consumer
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Mi
---
kind: Pod
apiVersion: v1
metadata:
  name: test-pod
  namespace: test-wait-for-consumer
spec:
  containers:
    - name: fedora
      image: registry.fedoraproject.org/fedora:latest
      command:
        - /bin/bash
        - -c
        - |
          echo "This is a test file for the simple PVC" > /data/test-file
          ls -l /data
          echo "Done"
      volumeMounts:
        - name: data
          mountPath: /data
  restartPolicy: OnFailure
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: test-pvc

---
apiVersion: v1
kind: Namespace
metadata:
  name: p3
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: p3
  namespace: p3
  labels:
    app.kubernetes.io/name: predictable-path-provisioner
    app.kubernetes.io/instance: p3
    app.kubernetes.io/version: "latest"
automountServiceAccountToken: true
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: "p3"
  labels:
    app.kubernetes.io/name: predictable-path-provisioner
    app.kubernetes.io/instance: p3
    app.kubernetes.io/version: "latest"
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: heathcliff.eu/predictable-path-provisioner
parameters:
  basePath: "/var/lib/predictable-path-provisioner"
  pathTemplate: "{{pvc.namespace}}/{{pvc.name}}"
reclaimPolicy: Delete
volumeBindingMode: Immediate
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: p3
  labels:
    app.kubernetes.io/name: predictable-path-provisioner
    app.kubernetes.io/instance: p3
    app.kubernetes.io/version: "latest"
rules:
  - apiGroups: ["*"]
    resources: ["storageclasses", "persistentvolumes", "persistentvolumeclaims"]
    verbs: ["*"]
  - apiGroups: ["*"]
    resources: ["events"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: p3
  labels:
    app.kubernetes.io/name: predictable-path-provisioner
    app.kubernetes.io/instance: p3
    app.kubernetes.io/version: "latest"
subjects:
  - kind: ServiceAccount
    name: p3
    namespace: p3
roleRef:
  kind: ClusterRole
  name: p3
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: p3
  namespace: p3
  labels:
    app.kubernetes.io/name: predictable-path-provisioner
    app.kubernetes.io/instance: p3
    app.kubernetes.io/version: "latest"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: predictable-path-provisioner
      app.kubernetes.io/instance: p3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: predictable-path-provisioner
        app.kubernetes.io/instance: p3
        app.kubernetes.io/version: "latest"
    spec:
      serviceAccountName: p3
      containers:
        - name: p3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          image: "ghcr.io/heathcliff26/p3:latest"
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LOG_LEVEL
              value: info
          volumeMounts:
            - name: rootfs
              mountPath: /host
      volumes:
        - name: rootfs
          hostPath:
            path: /
